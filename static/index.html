<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MatchMate - 相亲App MVP</title>
<style>
:root {
  --pink: #FF4B6E;
  --pink-light: #FF6B8A;
  --bg: #F8F8F8;
  --card-bg: #FFFFFF;
  --text: #2D2D2D;
  --text-light: #888888;
  --success: #4CD964;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ====== 顶部导航 ====== */
.navbar {
  width: 100%;
  max-width: 480px;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.navbar h1 {
  font-size: 24px;
  font-weight: 700;
  color: var(--pink);
}
.navbar h1 span { color: var(--text); font-weight: 400; }
.nav-actions { display:flex; gap:12px; }
.nav-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: none;
  background: #F0F0F0;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn.active { background: var(--pink); color: white; }

/* ====== 卡片区域 ====== */
.card-container {
  width: 100%;
  max-width: 480px;
  padding: 20px;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  min-height: 520px;
}

.card {
  width: 100%;
  max-width: 380px;
  background: var(--card-bg);
  border-radius: 20px;
  box-shadow: var(--shadow);
  overflow: hidden;
  position: absolute;
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
}

.card.swiped-left {
  transform: translateX(-150%) rotate(-20deg);
  opacity: 0;
}
.card.swiped-right {
  transform: translateX(150%) rotate(20deg);
  opacity: 0;
}
.card.swiping { transition: none; }

.card-img {
  width: 100%;
  height: 420px;
  object-fit: cover;
  display: block;
  background: linear-gradient(135deg, #FF6B8A 0%, #FF4B6E 50%, #C0392B 100%);
}

.card-info {
  padding: 20px;
}
.card-name-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.card-name {
  font-size: 24px;
  font-weight: 700;
}
.card-age {
  font-size: 22px;
  color: var(--text-light);
}
.card-badge {
  background: var(--pink);
  color: white;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 12px;
}
.card-distance {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 8px;
}
.card-bio {
  font-size: 14px;
  color: #555;
  line-height: 1.4;
  margin-bottom: 10px;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tag {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 14px;
  background: #FFF0F3;
  color: var(--pink);
  font-weight: 500;
}

/* ====== 操作按钮 ====== */
.action-bar {
  width: 100%;
  max-width: 480px;
  padding: 12px 30px 30px;
  display: flex;
  justify-content: center;
  gap: 28px;
}

.action-btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  transition: transform 0.15s, box-shadow 0.15s;
}
.action-btn:active { transform: scale(0.92); }
.btn-pass { background: white; color: #FF3B30; }
.btn-super { background: white; color: #007AFF; }
.btn-like { background: var(--success); color: white; }

/* ====== 匹配弹窗 ====== */
.match-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.match-overlay.show { display: flex; }
.match-dialog {
  background: white;
  border-radius: 24px;
  padding: 40px 30px;
  text-align: center;
  max-width: 340px;
  width: 90%;
}
.match-dialog h2 {
  font-size: 32px;
  color: var(--pink);
  margin-bottom: 8px;
}
.match-dialog p {
  color: #666;
  margin-bottom: 20px;
}
.match-dialog .match-avatars {
  display: flex;
  justify-content: center;
  gap: -16px;
  margin-bottom: 20px;
}
.match-dialog .match-avatars img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 3px solid white;
  object-fit: cover;
}
.btn-chat {
  padding: 14px 40px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, var(--pink), var(--pink-light));
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-right: 10px;
}
.btn-keep {
  padding: 14px 40px;
  border-radius: 30px;
  border: 2px solid #DDD;
  background: white;
  color: #555;
  font-size: 16px;
  cursor: pointer;
}

/* ====== API 调试/状态栏 ====== */
.status-bar {
  width: 100%;
  max-width: 480px;
  padding: 0 20px 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 4px;
}
.status-dot.online { background: var(--success); }
.status-dot.offline { background: #FF3B30; }

.api-section {
  width: 100%;
  max-width: 480px;
  padding: 20px;
  margin-bottom: 20px;
}
.api-section h3 {
  font-size: 16px;
  color: var(--text-light);
  margin-bottom: 12px;
}
.api-response {
  background: #1E1E1E;
  color: #4CD964;
  border-radius: 12px;
  padding: 16px;
  font-family: 'SF Mono', 'Consolas', monospace;
  font-size: 12px;
  white-space: pre-wrap;
  max-height: 200px;
  overflow-y: auto;
  line-height: 1.5;
}

/* ====== 底部 Tab ====== */
.tab-bar {
  width: 100%;
  max-width: 480px;
  display: flex;
  justify-content: space-around;
  padding: 12px 0 20px;
  background: white;
  border-top: 1px solid #EEE;
  position: sticky;
  bottom: 0;
}
.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-light);
  cursor: pointer;
  border: none;
  background: none;
}
.tab-item .tab-icon { font-size: 22px; }
.tab-item.active { color: var(--pink); }

/* 响应式 */
@media (max-width: 480px) {
  .card-img { height: 340px; }
  .card-name { font-size: 20px; }
}

/* 空状态 */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}
.empty-state .empty-icon { font-size: 60px; margin-bottom: 16px; }
</style>
</head>
<body>

<!-- 顶部导航 -->
<nav class="navbar">
  <h1>Match<span>Mate</span></h1>
  <div class="nav-actions">
    <button class="nav-btn" onclick="testAPI()">⚡</button>
  </div>
</nav>

<!-- 卡片区域 -->
<div class="card-container" id="cardContainer">
  <div class="card" id="currentCard">
    <div class="card-img" id="cardImg" style="background: linear-gradient(135deg, #FF6B8A, #FF4B6E);"></div>
    <div class="card-info">
      <div class="card-name-row">
        <span class="card-name" id="cardName">加载中...</span>
        <span class="card-age" id="cardAge"></span>
        <span class="card-badge" id="cardScore"></span>
      </div>
      <div class="card-distance" id="cardDist"></div>
      <div class="card-bio" id="cardBio"></div>
      <div class="card-tags" id="cardTags"></div>
    </div>
  </div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">💫</div>
    <p>今天的推荐已看完~</p>
    <p style="font-size:12px;color:#AAA;">明天会有新的缘分等着你</p>
  </div>
</div>

<!-- 操作按钮 -->
<div class="action-bar">
  <button class="action-btn btn-pass" onclick="swipe('pass')" title="跳过">✕</button>
  <button class="action-btn btn-super" onclick="swipe('super_like')" title="超级喜欢">★</button>
  <button class="action-btn btn-like" onclick="swipe('like')" title="喜欢">♥</button>
</div>

<!-- API 测试区域 -->
<div class="api-section" id="apiSection">
  <h3>📡 API 状态</h3>
  <div class="api-response" id="apiResponse">
点击 ⚡ 按钮测试后端 API ...
  </div>
</div>

<!-- 匹配弹窗 -->
<div class="match-overlay" id="matchOverlay">
  <div class="match-dialog">
    <h2>💕 匹配成功!</h2>
    <p>你与 <strong id="matchName"></strong> 互相喜欢</p>
    <div class="match-avatars">
      <img id="matchAvatar" src="" alt="">
    </div>
    <button class="btn-chat" onclick="closeMatch()">发起聊天 💬</button>
    <button class="btn-keep" onclick="closeMatch()">继续浏览</button>
  </div>
</div>

<!-- 底部 Tab -->
<div class="tab-bar">
  <button class="tab-item active"><span class="tab-icon">🔥</span> 发现</button>
  <button class="tab-item"><span class="tab-icon">💌</span> 匹配</button>
  <button class="tab-item"><span class="tab-icon">💬</span> 聊天</button>
  <button class="tab-item"><span class="tab-icon">👤</span> 我的</button>
</div>

<script>
// ==================== 数据 ====================
const API_BASE = window.location.origin + '/api';

const candidates = [
  {
    id: 'u1', name: 'Alice', age: 26, compatibility: 85,
    distance_km: 3.2, bio: '热爱旅行和摄影，周末喜欢探索城市角落',
    interests: ['旅行', '摄影', '咖啡', '瑜伽'],
    avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400'
  },
  {
    id: 'u2', name: 'Bob', age: 28, compatibility: 72,
    distance_km: 5.1, bio: '程序员一枚，平时喜欢打篮球和看电影',
    interests: ['编程', '篮球', '电影', '音乐'],
    avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400'
  },
  {
    id: 'u3', name: 'Cathy', age: 25, compatibility: 91,
    distance_km: 1.8, bio: '爱猫人士，周末喜欢去书店和公园',
    interests: ['阅读', '猫', '徒步', '烘焙'],
    avatar: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400'
  },
  {
    id: 'u4', name: 'David', age: 29, compatibility: 63,
    distance_km: 7.4, bio: '健身爱好者，也喜欢美食和游戏',
    interests: ['健身', '美食', '游戏', '跑步'],
    avatar: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400'
  },
  {
    id: 'u5', name: 'Eva', age: 24, compatibility: 78,
    distance_km: 2.5, bio: '自由插画师，养了一只叫"团子"的布偶猫',
    interests: ['绘画', '猫', '设计', '咖啡'],
    avatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400'
  }
];

let currentIndex = 0;
let isAnimating = false;

// ==================== 渲染卡片 ====================
function renderCard() {
  if (currentIndex >= candidates.length) {
    document.getElementById('currentCard').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('apiResponse').textContent = '✅ 推荐列表已遍历完毕\n💡 点 ⚡ 可实时请求后端 API 刷新数据';
    return;
  }

  document.getElementById('emptyState').style.display = 'none';
  const card = document.getElementById('currentCard');
  card.style.display = 'block';
  card.className = 'card';

  const c = candidates[currentIndex];
  document.getElementById('cardImg').style.backgroundImage = `url('${c.avatar}')`;
  document.getElementById('cardImg').style.backgroundSize = 'cover';
  document.getElementById('cardImg').style.backgroundPosition = 'center';
  document.getElementById('cardName').textContent = c.name;
  document.getElementById('cardAge').textContent = String(c.age);
  document.getElementById('cardScore').textContent = c.compatibility + '% 匹配';
  document.getElementById('cardDist').textContent = '📍 ' + c.distance_km + ' km';
  document.getElementById('cardBio').textContent = c.bio;

  const tagsHTML = c.interests.map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('cardTags').innerHTML = tagsHTML;
}

// ==================== 滑动操作 ====================
function swipe(type) {
  if (isAnimating || currentIndex >= candidates.length) return;
  isAnimating = true;

  const card = document.getElementById('currentCard');
  const matched = candidates[currentIndex];

  if (type === 'like') {
    card.classList.add('swiped-right');
    // 模拟 30% 匹配概率
    if (Math.random() < 0.3) {
      setTimeout(() => showMatch(matched), 400);
    }
  } else {
    card.classList.add('swiped-left');
  }

  currentIndex++;
  setTimeout(() => {
    renderCard();
    isAnimating = false;
  }, 450);
}

// ==================== 匹配弹窗 ====================
function showMatch(user) {
  document.getElementById('matchName').textContent = user.name;
  document.getElementById('matchAvatar').src = user.avatar;
  document.getElementById('matchOverlay').classList.add('show');
}
function closeMatch() {
  document.getElementById('matchOverlay').classList.remove('show');
}

// ==================== API 测试 ====================
async function testAPI() {
  const res = document.getElementById('apiResponse');
  res.textContent = '⏳ 请求中...';

  try {
    // 1. 健康检查
    const health = await fetch(API_BASE + '/health');
    const healthData = await health.json();

    // 2. 距离计算
    const dist = await fetch(API_BASE + '/distance?lat1=30.5&lon1=120.2&lat2=31.2&lon2=121.4');
    const distData = await dist.json();

    // 3. 兼容性评分
    const compat = await fetch(API_BASE + '/compatibility', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        "interests":["旅行","摄影","咖啡"],
        "hobbies":["瑜伽","跑步"],
        "looking_for":"长期关系",
        "personality_quiz":{"q1":"a","q2":"b","q3":"c"},
        "values":["家庭","诚实","健康"]
      }, {
        "interests":["摄影","美食","咖啡"],
        "hobbies":["游泳","跑步"],
        "looking_for":"长期关系",
        "personality_quiz":{"q1":"a","q2":"b","q3":"a"},
        "values":["家庭","冒险","健康"]
      })
    });
    const compatData = await compat.json();

    res.textContent = `✅ 后端 API 全部正常!

【健康检查】
  ${JSON.stringify(healthData)}

【距离计算】 杭州 → 上海
  ${JSON.stringify(distData)}

【兼容性评分】
  ${JSON.stringify(compatData, null, 2)}

━━━━━━━━━━━━━━━━━━━━
🚀 部署成功! 项目运行正常
📅 ${new Date().toISOString().split('T')[0]}
━━━━━━━━━━━━━━━━━━━━`;

  } catch (e) {
    res.textContent = '❌ API 请求失败: ' + e.message + '\n💡 请确认后端已部署到 Vercel';
  }
}

// ==================== 初始化 ====================
renderCard();

// 键盘操作
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') swipe('pass');
  if (e.key === 'ArrowRight') swipe('like');
  if (e.key === 'ArrowUp') swipe('super_like');
  if (e.key === 't') testAPI();
});
</script>
</body>
</html>
