<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MatchMate - 相亲App</title>
<style>
:root {
  --pink: #FF4B6E;
  --pink-light: #FF6B8A;
  --bg: #F8F8F8;
  --card-bg: #FFFFFF;
  --text: #2D2D2D;
  --text-light: #888888;
  --success: #4CD964;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.navbar {
  width: 100%;
  max-width: 480px;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.navbar h1 { font-size: 24px; font-weight: 700; color: var(--pink); }
.navbar h1 span { color: var(--text); font-weight: 400; }
.nav-actions { display:flex; gap:12px; }
.nav-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: none; background: #F0F0F0; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.nav-btn.active { background: var(--pink); color: white; }

/* 登录区域 */
.login-bar {
  width: 100%; max-width: 480px; padding: 10px 20px;
  display: flex; gap: 8px; align-items: center;
}
.login-bar input {
  flex:1; padding: 10px 14px; border: 1px solid #DDD; border-radius: 8px;
  font-size: 14px; outline: none;
}
.login-bar input:focus { border-color: var(--pink); }
.login-bar button {
  padding: 10px 20px; border: none; border-radius: 8px;
  background: var(--pink); color: white; font-size: 14px; font-weight: 600; cursor: pointer;
}
.login-bar .user-info { font-size:13px; color: var(--success); font-weight: 600; display: none; }

/* 卡片区域 */
.card-container {
  width: 100%; max-width: 480px; padding: 10px 20px;
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; min-height: 480px;
}

.card {
  width: 100%; max-width: 380px; background: var(--card-bg);
  border-radius: 20px; box-shadow: var(--shadow); overflow: hidden;
  position: absolute;
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
}
.card.swiped-left { transform: translateX(-150%) rotate(-20deg); opacity: 0; }
.card.swiped-right { transform: translateX(150%) rotate(20deg); opacity: 0; }
.card.swiping { transition: none; }

.card-img {
  width: 100%; height: 380px; object-fit: cover; display: block;
  background: linear-gradient(135deg, #FF6B8A 0%, #FF4B6E 50%, #C0392B 100%);
}
.card-info { padding: 20px; }
.card-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.card-name { font-size: 24px; font-weight: 700; }
.card-age { font-size: 22px; color: var(--text-light); }
.card-badge { background: var(--pink); color: white; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 12px; }
.card-distance { font-size: 13px; color: var(--text-light); margin-bottom: 8px; }
.card-bio { font-size: 14px; color: #555; line-height: 1.4; margin-bottom: 10px; }
.card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 12px; padding: 5px 12px; border-radius: 14px; background: #FFF0F3; color: var(--pink); font-weight: 500; }

/* 操作按钮 */
.action-bar {
  width: 100%; max-width: 480px; padding: 12px 30px 30px;
  display: flex; justify-content: center; gap: 28px;
}
.action-btn {
  width: 60px; height: 60px; border-radius: 50%; border: none;
  font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1); transition: transform 0.15s, box-shadow 0.15s;
}
.action-btn:active { transform: scale(0.92); }
.action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-pass { background: white; color: #FF3B30; }
.btn-super { background: white; color: #007AFF; }
.btn-like { background: var(--success); color: white; }

/* 匹配弹窗 */
.match-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
.match-overlay.show { display: flex; }
.match-dialog {
  background: white; border-radius: 24px; padding: 40px 30px;
  text-align: center; max-width: 340px; width: 90%;
}
.match-dialog h2 { font-size: 32px; color: var(--pink); margin-bottom: 8px; }
.match-dialog p { color: #666; margin-bottom: 20px; }
.match-dialog .match-avatars {
  display: flex; justify-content: center; gap: -16px; margin-bottom: 20px;
}
.match-dialog .match-avatars img {
  width: 80px; height: 80px; border-radius: 50%; border: 3px solid white; object-fit: cover;
}
.btn-chat { padding: 14px 40px; border-radius: 30px; border: none; background: linear-gradient(135deg, var(--pink), var(--pink-light)); color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-right: 10px; }
.btn-keep { padding: 14px 40px; border-radius: 30px; border: 2px solid #DDD; background: white; color: #555; font-size: 16px; cursor: pointer; }

/* 状态栏 */
.status-bar {
  width: 100%; max-width: 480px; padding: 0 20px 10px;
  display: flex; gap: 8px; justify-content: center; font-size: 12px; color: var(--text-light);
}
.status-bar .token-status { color: #888; }
.status-bar .token-status.active { color: var(--success); font-weight: 600; }

.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-light);
}
.empty-state .empty-icon { font-size: 60px; margin-bottom: 16px; }

@media (max-width: 480px) {
  .card-img { height: 300px; }
  .card-name { font-size: 20px; }
}
</style>
</head>
<body>

<nav class="navbar">
  <h1>Match<span>Mate</span></h1>
  <div class="nav-actions">
    <button class="nav-btn active" id="loginBtn" onclick="doLogin()" title="登录">🔑</button>
  </div>
</nav>

<div class="login-bar">
  <input type="text" id="tokenInput" placeholder="输入 Access Token（登录后获取）">
  <button onclick="doLogin()">登录</button>
  <span class="user-info" id="userInfo">已登录</span>
</div>

<div class="status-bar">
  <span class="token-status" id="tokenStatus">未登录</span>
  <span> | </span>
  <span id="deckStatus">未加载推荐</span>
</div>

<div class="card-container" id="cardContainer">
  <div class="card" id="currentCard" style="display:none;">
    <div class="card-img" id="cardImg" style="background: linear-gradient(135deg, #FF6B8A, #FF4B6E);"></div>
    <div class="card-info">
      <div class="card-name-row">
        <span class="card-name" id="cardName">--</span>
        <span class="card-age" id="cardAge"></span>
      </div>
      <div class="card-distance" id="cardDist"></div>
      <div class="card-bio" id="cardBio"></div>
      <div class="card-tags" id="cardTags"></div>
    </div>
  </div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">💫</div>
    <p id="emptyMsg">请先登录以加载推荐用户</p>
  </div>
</div>

<div class="action-bar">
  <button class="action-btn btn-pass" onclick="doSwipe('pass')" disabled id="btnPass" title="跳过">✕</button>
  <button class="action-btn btn-super" onclick="doSwipe('super_like')" disabled id="btnSuper" title="超级喜欢">★</button>
  <button class="action-btn btn-like" onclick="doSwipe('like')" disabled id="btnLike" title="喜欢">♥</button>
</div>

<div class="match-overlay" id="matchOverlay">
  <div class="match-dialog">
    <h2>💕 匹配成功!</h2>
    <p>你与 <strong id="matchName"></strong> 互相喜欢</p>
    <div class="match-avatars">
      <img id="matchAvatar" src="" alt="">
    </div>
    <button class="btn-chat" onclick="closeMatch()">发起聊天 💬</button>
    <button class="btn-keep" onclick="closeMatch()">继续浏览</button>
  </div>
</div>

<script>
const API_BASE = window.location.origin;

let accessToken = '';
let candidates = [];
let currentIndex = 0;
let isAnimating = false;

// ==================== 登录 ====================
async function doLogin() {
  const input = document.getElementById('tokenInput');
  const token = input.value.trim();
  if (!token) return alert('请输入 Access Token');

  // 验证 token 是否有效
  try {
    const resp = await fetch(API_BASE + '/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!resp.ok) {
      document.getElementById('tokenStatus').textContent = 'Token 无效 (HTTP ' + resp.status + ')';
      document.getElementById('tokenStatus').className = 'token-status';
      return;
    }
    const userData = await resp.json();
    accessToken = token;
    document.getElementById('tokenStatus').textContent = '已登录: ' + (userData.email || userData.phone || userData.id);
    document.getElementById('tokenStatus').className = 'token-status active';
    document.getElementById('userInfo').style.display = 'inline';
    document.getElementById('btnPass').disabled = false;
    document.getElementById('btnSuper').disabled = false;
    document.getElementById('btnLike').disabled = false;
    loadDeck();
  } catch (e) {
    document.getElementById('tokenStatus').textContent = '网络错误: ' + e.message;
  }
}

// ==================== 加载推荐列表 ====================
async function loadDeck() {
  if (!accessToken) return;
  document.getElementById('deckStatus').textContent = '加载中...';
  try {
    const resp = await fetch(API_BASE + '/api/deck/explore', {
      headers: { 'Authorization': 'Bearer ' + accessToken }
    });
    if (resp.status === 401) {
      document.getElementById('deckStatus').textContent = 'Token过期，请重新登录';
      accessToken = '';
      return;
    }
    const data = await resp.json();
    candidates = data.candidates || [];
    currentIndex = 0;
    document.getElementById('deckStatus').textContent = '推荐 ' + candidates.length + ' 人';
    renderCard();
  } catch (e) {
    document.getElementById('deckStatus').textContent = '加载失败: ' + e.message;
  }
}

// ==================== 渲染卡片 ====================
function renderCard() {
  const empty = document.getElementById('emptyState');
  const card = document.getElementById('currentCard');

  if (currentIndex >= candidates.length) {
    card.style.display = 'none';
    empty.style.display = 'block';
    document.getElementById('emptyMsg').textContent = '推荐列表已看完~ 明天会有新的缘分等着你';
    document.getElementById('deckStatus').textContent = '已看完 ' + candidates.length + ' 人';
    return;
  }

  empty.style.display = 'none';
  card.style.display = 'block';
  card.className = 'card';

  const c = candidates[currentIndex];

  // 头像
  if (c.avatar) {
    document.getElementById('cardImg').style.backgroundImage = `url('${c.avatar}')`;
  }
  document.getElementById('cardImg').style.backgroundSize = 'cover';
  document.getElementById('cardImg').style.backgroundPosition = 'center';

  document.getElementById('cardName').textContent = c.name || '(未设置昵称)';
  document.getElementById('cardAge').textContent = c.age ? String(c.age) : '';
  document.getElementById('cardDist').textContent = c.city ? '📍 ' + c.city : '';
  document.getElementById('cardBio').textContent = c.bio || '这个人很懒，什么都没写~';

  if (c.interests && c.interests.length) {
    document.getElementById('cardTags').innerHTML = c.interests.map(t => `<span class="tag">${t}</span>`).join('');
  } else {
    document.getElementById('cardTags').innerHTML = '';
  }

  document.getElementById('deckStatus').textContent = (currentIndex + 1) + ' / ' + candidates.length;
}

// ==================== 滑动操作 ====================
async function doSwipe(type) {
  if (isAnimating || currentIndex >= candidates.length || !accessToken) return;
  isAnimating = true;

  const target = candidates[currentIndex];
  const card = document.getElementById('currentCard');

  // 调用真实后端 API
  try {
    const url = API_BASE + '/api/match/swipe?target_user_id=' + encodeURIComponent(target.user_id) + '&swipe_type=' + type;
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + accessToken }
    });

    if (resp.ok) {
      const result = await resp.json();

      // 动画
      if (type === 'like' || type === 'super_like') {
        card.classList.add('swiped-right');
      } else {
        card.classList.add('swiped-left');
      }

      // 双向匹配弹窗
      if (result.is_mutual) {
        setTimeout(() => {
          document.getElementById('matchName').textContent = target.name;
          document.getElementById('matchAvatar').src = target.avatar || '';
          document.getElementById('matchOverlay').classList.add('show');
        }, 400);
      }
    } else {
      console.error('滑动请求失败:', resp.status, await resp.text());
    }
  } catch (e) {
    console.error('滑动请求异常:', e);
  }

  currentIndex++;
  setTimeout(() => {
    renderCard();
    isAnimating = false;
  }, 450);
}

function closeMatch() {
  document.getElementById('matchOverlay').classList.remove('show');
}

// 键盘操作
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') doSwipe('pass');
  if (e.key === 'ArrowRight') doSwipe('like');
  if (e.key === 'ArrowUp') doSwipe('super_like');
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
